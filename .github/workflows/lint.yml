name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.18.x'
        check-latest: true

    - run: go mod tidy
    - run: go version
    - run: go fix ./...
    - run: go vet -methods=false ./...
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.4.0
